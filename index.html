<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>小小4J長大了</title>
  <link rel="stylesheet" href="css/game.css">
</head>
<body>
  <div id="game-container">
    <!-- Gate Screen (Age Verification) -->
    <div id="screen-gate" class="screen active">
      <div id="gate-bg"></div>
      <div class="gate-content">
        <h1 class="gate-title">小小4J長大了</h1>
        <p class="gate-warning">本遊戲含成人內容，需年齡驗證</p>
        <div class="gate-form">
          <label class="gate-label">請輸入你的名字</label>
          <input type="text" id="gate-name" class="gate-input" placeholder="輸入玩家名稱..." maxlength="12">
          <label class="gate-label gate-question">請問小4J有幾公分？</label>
          <input type="text" id="gate-answer" class="gate-input" placeholder="請輸入數字...">
          <p id="gate-error" class="gate-error"></p>
          <button class="btn-main" onclick="game.verifyGate()">進入遊戲</button>
        </div>
      </div>
    </div>

    <!-- Title Screen -->
    <div id="screen-title" class="screen">
      <div id="title-bg"></div>
      <div class="title-content">
        <h1 class="game-title">小小4J長大了</h1>
        <p class="game-subtitle">Little 4J Grew Up</p>
        <div class="title-buttons">
          <button class="btn-main" onclick="game.newGame()">新遊戲</button>
          <button class="btn-main" id="btn-continue" onclick="game.loadGame()" style="display:none">繼續遊戲</button>
        </div>
      </div>
    </div>

    <!-- Hub Screen -->
    <div id="screen-hub" class="screen">
      <div id="hub-bg"></div>
      <div class="hub-header">
        <div class="day-display">第 <span id="day-num">1</span> 天</div>
        <div class="month-display">月收入: NT$ <span id="income-display">22,000</span></div>
        <button class="btn-save-small" onclick="game.saveGame()">存檔</button>
      </div>
      <div class="stats-bar">
        <div class="stat"><span class="stat-icon">💪</span> 體力 <span id="stat-stamina">100</span>/100</div>
        <div class="stat"><span class="stat-icon">💰</span> 金錢 <span id="stat-money">50,000</span></div>
        <div class="stat"><span class="stat-icon">✨</span> 魅力 <span id="stat-charm">0</span></div>
        <div class="stat"><span class="stat-icon">📖</span> 見識 <span id="stat-insight">0</span></div>
        <div class="stat"><span class="stat-icon">👑</span> 地位 <span id="stat-status">0</span></div>
      </div>
      <div class="actions-grid">
        <button class="action-card" data-action="study" onclick="game.doAction('study')">
          <div class="action-icon">📚</div>
          <div class="action-name">投資自己</div>
          <div class="action-cost">體力-30 💰-5,000</div>
          <div class="action-gain">見識+5</div>
        </button>
        <button class="action-card" data-action="work" onclick="game.doAction('work')">
          <div class="action-icon">💼</div>
          <div class="action-name">打工</div>
          <div class="action-cost">體力-20</div>
          <div class="action-gain">💰+8,000~15,000</div>
        </button>
        <button class="action-card" data-action="cars" onclick="game.doAction('cars')">
          <div class="action-icon">🚗</div>
          <div class="action-name">看車/買車</div>
          <div class="action-cost">體力-10 💰-2,000</div>
          <div class="action-gain">魅力+8</div>
        </button>
        <button class="action-card" data-action="travel" onclick="game.doAction('travel')">
          <div class="action-icon">✈️</div>
          <div class="action-name">旅遊</div>
          <div class="action-cost">💰-10,000~80,000</div>
          <div class="action-gain">見識+10 體力+25</div>
        </button>
        <button class="action-card locked" data-action="rotary" id="action-rotary" onclick="game.doAction('rotary')">
          <div class="action-icon">🏛️</div>
          <div class="action-name">扶輪社</div>
          <div class="action-cost">體力-15 💰-30,000</div>
          <div class="action-gain">地位+15</div>
          <div class="action-lock">需見識≥60 月收入≥80k</div>
        </button>
        <button class="action-card locked" data-action="date" id="action-date" onclick="game.openDateMenu()">
          <div class="action-icon">💕</div>
          <div class="action-name">約會</div>
          <div class="action-cost">選擇約會對象</div>
          <div class="action-gain">好感度UP</div>
          <div class="action-lock" id="date-lock-text">需先認識角色</div>
        </button>
        <button class="action-card" data-action="rest" onclick="game.doAction('rest')">
          <div class="action-icon">😴</div>
          <div class="action-name">休息</div>
          <div class="action-cost">消耗1天</div>
          <div class="action-gain">體力+50</div>
        </button>
        <button class="action-card" data-action="shop" onclick="game.openShop()">
          <div class="action-icon">🛍️</div>
          <div class="action-name">商店</div>
          <div class="action-cost">購買禮物/道具</div>
          <div class="action-gain">送禮增加好感</div>
        </button>
      </div>
      <div class="affection-bar" id="affection-bar"></div>
    </div>

    <!-- Dialogue / VN Screen -->
    <div id="screen-vn" class="screen">
      <div id="vn-bg" class="vn-background"></div>
      <div id="vn-cg" class="vn-cg"></div>
      <div id="vn-dialogue" class="vn-dialogue-box">
        <div class="vn-name" id="vn-name"></div>
        <div class="vn-text" id="vn-text"></div>
        <div class="vn-choices" id="vn-choices"></div>
        <div class="vn-click-hint" id="vn-hint">▼ 點擊繼續</div>
      </div>
    </div>

    <!-- Ending Screen -->
    <div id="screen-ending" class="screen">
      <div id="ending-cg" class="ending-cg"></div>
      <div class="ending-overlay">
        <h2 id="ending-title" class="ending-title"></h2>
        <p id="ending-text" class="ending-text"></p>
        <button class="btn-main" onclick="game.returnToTitle()">回到標題</button>
      </div>
    </div>

    <!-- Date Menu popup -->
    <div id="popup-date" class="popup" style="display:none">
      <div class="popup-content popup-wide">
        <h3 id="date-popup-title">選擇約會對象</h3>
        <div id="date-char-select" class="char-select-grid"></div>
        <div id="date-type-select" class="date-type-grid" style="display:none"></div>
        <div id="date-result-area" style="display:none"></div>
        <button class="btn-sub" onclick="game.closeDateMenu()">返回</button>
      </div>
    </div>

    <!-- Shop popup -->
    <div id="popup-shop" class="popup" style="display:none">
      <div class="popup-content popup-wide">
        <h3>商店</h3>
        <div id="shop-items" class="shop-grid"></div>
        <div id="shop-gift-select" class="char-select-grid" style="display:none"></div>
        <button class="btn-sub" onclick="game.closeShop()">返回</button>
      </div>
    </div>

    <!-- Result popup -->
    <div id="popup-result" class="popup" style="display:none">
      <div class="popup-content">
        <h3 id="popup-title"></h3>
        <div id="popup-body"></div>
        <button class="btn-main" onclick="game.closePopup()">確定</button>
      </div>
    </div>
  </div>

  <script src="js/save.js"></script>
  <script src="js/data.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/engine.js"></script>
</body>
</html>
